server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: users
              uri: lb://users
              predicates:
                - Path=/user-management/**
              filters:
                - StripPrefix=1
            - id: workouts
              uri: lb://workouts
              predicates:
                - Path=/workout-management/**
              filters:
                - StripPrefix=1
            - id: nutrition
              uri: lb://nutrition
              predicates:
                - Path=/nutrition-management/**
              filters:
                - StripPrefix=1
