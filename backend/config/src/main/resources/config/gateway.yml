server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user
              uri: lb://user
              predicates:
                - Path=/user-management/**
              filters:
                - StripPrefix=1
            - id: workout
              uri: lb://workout
              predicates:
                - Path=/workout-management/**
              filters:
                - StripPrefix=1
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
                - AddRequestHeader=X-Forwarded-Prefix, /workout-management
                - AddRequestHeader=X-Forwarded-Host, ${GATEWAY_HOST}:${GATEWAY_PORT}
            - id: nutrition
              uri: lb://nutrition
              predicates:
                - Path=/nutrition-management/**
              filters:
                - StripPrefix=1
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
                - AddRequestHeader=X-Forwarded-Prefix, /nutrition-management
                - AddRequestHeader=X-Forwarded-Host, ${GATEWAY_HOST}:${GATEWAY_PORT}
          default-filters:
            - PreserveHostHeader
