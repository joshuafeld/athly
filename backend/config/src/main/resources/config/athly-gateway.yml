eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:8761/eureka

security:
  jwt:
    public-key-pem: ${JWT_PUBLIC_KEY}

server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: athly-user
              uri: lb://athly-user
              predicates:
                - Path=/user-management/**
              filters:
                - StripPrefix=1
            - id: athly-workout
              uri: lb://athly-workout
              predicates:
                - Path=/workout-management/**
              filters:
                - StripPrefix=1
            - id: athly-nutrition
              uri: lb://athly-nutrition
              predicates:
                - Path=/nutrition-management/**
              filters:
                - StripPrefix=1
