security:
  jwt:
    ttl: 3600
    private-key-pem: ${JWT_PRIVATE_KEY}

server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
